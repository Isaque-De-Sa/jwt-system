<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta></meta>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Sistema de login</title>



    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;

    background:
    linear-gradient(
        135deg,
        #0f172a,
        #111827,
        #1e293b
    );
}

.bg-animation{
    position:absolute;

    width:700px;
    height:700px;

    background:
    radial-gradient(
        circle,
        rgba(59,130,246,.35),
        transparent 70%
    );

    filter:blur(40px);

    animation:float 8s ease-in-out infinite;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-30px);
    }

    100%{
        transform:translateY(0px);
    }
}

.container{
    position:relative;

    width:1100px;
    max-width:95%;

    display:grid;
    grid-template-columns:1fr 450px;

    border-radius:30px;

    overflow:hidden;

    backdrop-filter:blur(20px);

    background:
    rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.1);

    box-shadow:
    0 20px 60px rgba(0,0,0,.45);
}

.left-panel{
    padding:70px;

    color:white;

    display:flex;
    flex-direction:column;
    justify-content:center;
}

.brand h1{
    font-size:52px;
    margin-bottom:20px;
}

.brand p{
    font-size:18px;
    line-height:1.6;
    opacity:.8;
}

.features{
    margin-top:50px;

    display:flex;
    flex-direction:column;
    gap:25px;
}

.feature{
    display:flex;
    align-items:center;
    gap:15px;

    font-size:18px;
}

.feature i{
    font-size:28px;
    color:#3b82f6;
}

.login-form{
    background:white;

    padding:50px 40px;

    position:relative;
}

.form{
    display:none;

    animation:fade .4s ease;
}

.form.active{
    display:block;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateX(20px);
    }

    to{
        opacity:1;
        transform:translateX(0);
    }
}

.form h2{
    font-size:32px;
    margin-bottom:30px;
}

.input-group{
    display:flex;
    flex-direction:column;

    margin-bottom:20px;
}

.input-group label{
    margin-bottom:8px;
    font-weight:600;
}

.input-group input{
    height:55px;

    border:none;

    border-radius:14px;

    padding:0 15px;

    background:#f1f5f9;

    font-size:15px;

    transition:.2s;
}

.input-group input:focus{
    outline:none;

    background:white;

    box-shadow:
    0 0 0 3px rgba(59,130,246,.25);
}

.login-button{
    width:100%;
    height:55px;

    border:none;

    border-radius:14px;

    background:#2563eb;

    color:white;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;

    transition:.2s;
}

.login-button:hover{
    transform:translateY(-2px);

    background:#1d4ed8;
}

.links{
    margin-top:20px;

    display:flex;
    justify-content:space-between;
}

.links a{
    color:#2563eb;

    cursor:pointer;

    text-decoration:none;

    font-size:14px;
}

@media(max-width:900px){

    .container{
        grid-template-columns:1fr;
    }

    .left-panel{
        display:none;
    }
}



.toast {
    position: fixed;

    top: 25px;
    right: 25px;

    min-width: 320px;

    padding: 16px 18px;

    border-radius: 16px;

    backdrop-filter: blur(10px);

    background: rgba(25,25,25,0.95);

    box-shadow:
        0 10px 30px rgba(0,0,0,0.25);

    transform: translateX(120%);
    opacity: 0;

    transition:
        transform .35s ease,
        opacity .35s ease;

    z-index: 9999;
}

.toast.show {
    transform: translateX(0);
    opacity: 1;
}

.toast-content {
    display: flex;
    align-items: center;
    gap: 14px;
}

.toast-icon i {
    font-size: 22px;
}

.toast-text span {
    color: white;

    font-size: 15px;
    font-weight: 500;

    font-family: Arial, Helvetica, sans-serif;
}

/* SUCCESS */

.toast.success {
    border-left: 5px solid #22c55e;
}

.toast.success .toast-icon i {
    color: #22c55e;
}

/* ERROR */

.toast.error {
    border-left: 5px solid #ef4444;
}

.toast.error .toast-icon i {
    color: #ef4444;
}

/* WARNING */

.toast.aviso {
    border-left: 5px solid #f59e0b;
}

.toast.aviso .toast-icon i {
    color: #f59e0b;
}

    </style>
</head>

<body>


<body>


    <div class="bg-animation"></div>

    <div class="container">

        <!-- LADO ESQUERDO -->

        <div class="left-panel">

            <div class="brand">
                <h1>SystemAuth</h1>
                <p>
                    Plataforma moderna de autenticação
                    com FastAPI + JWT
                </p>
            </div>

            <div class="features">

                <div class="feature">
                    <i class="bi bi-shield-lock"></i>
                    <span>Autenticação Segura</span>
                </div>

                <div class="feature">
                    <i class="bi bi-lightning-charge"></i>
                    <span>API Rápida com FastAPI</span>
                </div>

                <div class="feature">
                    <i class="bi bi-person-check"></i>
                    <span>Gerenciamento de Usuários</span>
                </div>

            </div>

        </div>

        <!-- LOGIN -->

        <div class="login-form">

            <div class="form-slider">

                <!-- LOGIN -->

                <form id="login" class="form active">

                    <h2>Entrar</h2>

                    <div class="input-group">
                        <label>Usuário</label>
                        <input type="text" id="usuario">
                    </div>

                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" id="senha">
                    </div>

                    <button class="login-button">
                        Entrar
                    </button>

                    <div class="links">
                        <a onclick="showForm('register')">
                            Criar conta
                        </a>

                        <a onclick="showForm('forgot')">
                            Esqueci a senha
                        </a>
                    </div>

                </form>

                <!-- REGISTER -->

                <form id="register" class="form">

                    <h2>Criar Conta</h2>

                    <div class="input-group">
                        <label>Usuário</label>
                        <input type="text" id="reg_user">
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="reg_email">
                    </div>

                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" id="reg_pass">
                    </div>

                    <button class="login-button">
                        Registrar
                    </button>

                    <div class="links">
                        <a onclick="showForm('login')">
                            Voltar
                        </a>
                    </div>

                </form>

                <!-- FORGOT -->

                <form id="forgot" class="form">

                    <h2>Recuperar Senha</h2>

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email">
                    </div>

                    <button class="login-button">
                        Recuperar
                    </button>

                    <div class="links">
                        <a onclick="showForm('login')">
                            Voltar
                        </a>
                    </div>

                </form>

            </div>

        </div>

    </div>



    <div class="toast" id="toast">
    <div class="toast-content">

        <div class="toast-icon">
            <i class="bi bi-check-circle-fill"></i>
        </div>

        <div class="toast-text">
            <span id="toast-msg">Mensagem aqui</span>
        </div>

    </div>
</div>

<script src="/static/js/login.js"></script>

</body>



</html>
