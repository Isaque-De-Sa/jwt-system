    <script>
        async function verificar_token() {

    const token = localStorage.getItem('token');

    // sem token
    if (!token) {
        return;
    }

    try {

        const res = await fetch('http://127.0.0.1:8000/perfil', {

            method: 'POST',

            headers: {
                'Authorization': `Bearer ${token}`
            }

        });

        const dados = await res.json();


        if(token) {
            setTimeout(() => {
                window.location.href ="index";
            }, 0)
        }



    } catch (erro) {

        console.log(erro);

        localStorage.removeItem('token');

    }

}

verificar_token();
    </script>
    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;

    background:
    linear-gradient(
        135deg,
        #0f172a,
        #111827,
        #1e293b

}

.bg-animation{
    position:absolute;

    width:700px;
    height:700px;

    background:
    radial-gradient(
        circle,
        rgba(59,130,246,.35),
        transparent 70%

}

@keyframes float{

    0%{
        transform:translateY(0px);

    }

    }
}

.container{

}

.left-panel{

}

.brand h1{

}

.brand p{

    opacity:.8;
}

.features{

    display:flex;
    flex-direction:column;

}

.feature{
    display:flex;
    align-items:center;
    gap:15px;

}

.feature i{
    font-size:28px;
    color:#3b82f6;
}

.login-form{
    background:white;

    padding:50px 40px;

    position:relative;
}

.form{

    animation:fade .4s ease;
}

.form.active{

}

@keyframes fade{

    }

    to{
        opacity:1;
        transform:translateX(0);
    }
}

.form h2{
    font-size:32px;
    margin-bottom:30px;
}

.input-group{
    display:flex;

}

.input-group label{

}

.input-group input{

.input-group input:focus{

    box-shadow:

}

.toast {
    position: fixed;

    top: 25px;
    right: 25px;

    min-width: 320px;

    padding: 16px 18px;

    border-radius: 16px;

    backdrop-filter: blur(10px);

    background: rgba(25,25,25,0.95);

    box-shadow:
        0 10px 30px rgba(0,0,0,0.25);

    transform: translateX(120%);

    transition:
        transform .35s ease,

}

}

}

.toast-text span {

}

/* SUCCESS */

.toast.success {

}

.toast.success .toast-icon i {

}

/* ERROR */

.toast.error {

}

.toast.error .toast-icon i {

}

/* WARNING */

.toast.aviso {

.toast.aviso .toast-icon i {

    </style>
</head>

<body>


<body>


    <div class="bg-animation"></div>

    <div class="container">

        <!-- LADO ESQUERDO -->

</div>

    <script>


//=========== aviso modal ==========================


function showForm(id) {

    const titles = {
        login: 'Acessar Conta',
        register: 'Criar Conta',
        forgot: 'Recuperar Senha'
    };

    // remove active
    document.querySelectorAll('.form').forEach(form => {

        form.classList.remove('active');

        // anima saída
        form.classList.remove('form-enter');

    });

    // pega form atual
    const currentForm = document.getElementById(id);

    // pequena animação
    setTimeout(() => {

        currentForm.classList.add('active');
        currentForm.classList.add('form-enter');

    }, 100);

}

// TOAST

function showToast(message, type = 'success') {

    const toast = document.getElementById('toast');
    const msg = document.getElementById('toast-msg');
    const icon = toast.querySelector('i');

    msg.textContent = message;

    // limpa classes antigas
    toast.className = 'toast';

    // ícones
    if(type === 'success'){
        icon.className = 'bi bi-check-circle-fill';
    }

    if(type === 'error'){
        icon.className = 'bi bi-x-circle-fill';
    }

    if(type === 'aviso'){
        icon.className = 'bi bi-exclamation-triangle-fill';
    }

    // ativa
    toast.classList.add('show', type);

    setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}

//=========== aviso modal ==========================


const u = document.getElementById("usuario");
const p = document.getElementById("senha");


document.getElementById("register").addEventListener("submit", async (e) => {

    console.log("clicou")
    e.preventDefault();

    const reg_user = document.getElementById("reg_user").value;
    const reg_email = document.getElementById("reg_email").value;
    const reg_pass = document.getElementById("reg_pass").value;


    
    const res = await fetch("http://127.0.0.1:8000/register", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            reg_user,
            reg_email,
            reg_pass
        })
    })
    
    const dados = await res.json();

    if(dados.status == "accept") {
        showToast('Registro realizado com sucesso','success');
        u.value = reg_email;
        p.value = reg_pass;
        
    setTimeout(() => {

        document.getElementById('toast')
            .classList.remove('show');

        showForm("login");

    }, 1200);

    } else if (dados.status == "aviso") {
        showToast(String(dados.mensagem), String(dados.status));
    }

})


// fetch login

document.getElementById('login').addEventListener('submit', async (e) => {

        console.log('clicou');

        
    e.preventDefault();

    const user = u.value;
    const pass2 = p.value;


    const res = await fetch('http://127.0.0.1:8000/login', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            user,
            pass2
        })
    })

    const dados = await res.json();

    if (dados.status == 'accept') {
           // salva token
        localStorage.setItem('token', dados.token);

        showToast('Login realizado com sucesso', 'success');

        // espera um pouco e redireciona
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 1000);

    } else if (dados.status == "error") {
         localStorage.removeItem('token');
        showToast(String(dados.mensagem), 'error');
        
    }    
});




</script>
